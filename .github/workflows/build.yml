name: Build FSOCIETY EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '6.0.x'
    - name: Publish
      run: dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o output
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: fsociety-exe
        path: output/fsociety.exe
