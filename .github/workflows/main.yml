name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '6.0.x'
    - run: dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o output
    - uses: actions/upload-artifact@v3
      with:
        name: fsociety
        path: output/
